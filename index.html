<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- J.H.S -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/215e173525.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Presente para o meu amor</title>
</head>
<body>
    <main class="app">
        <header class="header">
            <div class="left-icon">
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="title">
                <p>Te amo! ❤️</p>
            </div>
            <div class="right-icon">
                <i class="fa-solid fa-ellipsis"></i>
            </div>
        </header>
        <section class="music-section">

            <audio src="assets/music.mp3"></audio>

            <div class="cover">
                <img src="assets/capa.jpg" alt="Imagem da capa">
            </div>
            <div class="music-info">
                <div class="text-info">
                    <div class="title">
                        <h1>Until I Found You (Em Beihold Version)</h1>
                    </div>
                    <div class="artist">
                        <h2>Stephen Sanchez e Em Beihold</h2>
                    </div>
                </div>
                <div class="saved-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
            </div>
            <div class="player">
                <div class="progress-bar">
                    <input type="range" name="" id="progress" min="0" value="0">
                    
                    <div class="time">
                        <time class="current">0:00</time>
                        <time class="total">2:57</time>
                    </div>
                </div>
                <div class="controls">
                    <div class="shuffle">
                        <i class="fa-solid fa-shuffle"></i>
                    </div>
                    <div class="track">
                        <div class="backward">
                            <i class="fa-solid fa-backward-step"></i>
                        </div>
                        <button class="play-pause">
                            <i class="fa-solid fa-play"></i>
                            <i class="fa-solid fa-pause"></i>
                        </button>
                        <div class="forward">
                            <i class="fa-solid fa-forward-step"></i>
                        </div>
                    </div>
                    <div class="repeat">
                        <i class="fa-solid fa-repeat"></i>
                    </div>
                </div>
            </div>
        </section>
        <section class="counter-section">

        </section>
        <section class="text-section">

        </section>
        <section class="wrapped-section">

        </section>
    </main>
</body>
</html>
